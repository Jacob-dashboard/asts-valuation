name: Update market data

on:
  schedule:
    - cron: "30 21 * * 1-5"   # weekdays 21:30 UTC — after the 4pm ET close year-round
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch ASTS quote (Cboe delayed, Yahoo fallback)
        run: |
          set -euo pipefail
          px=""; qdate=""
          if q=$(curl -fsSL --max-time 30 "https://cdn.cboe.com/api/global/delayed_quotes/quotes/ASTS.json"); then
            px=$(echo "$q" | jq -r 'if (.data.close // 0) > 0 then .data.close else .data.current_price end')
            qdate=$(echo "$q" | jq -r '.timestamp' | cut -d' ' -f1)
            src="cboe delayed quote"
          else
            y=$(curl -fsSL --max-time 30 -H "User-Agent: Mozilla/5.0" \
              "https://query1.finance.yahoo.com/v8/finance/chart/ASTS?interval=1d&range=1d")
            px=$(echo "$y" | jq -r '.chart.result[0].meta.regularMarketPrice')
            qdate=$(date -u +%F)
            src="yahoo chart api"
          fi
          echo "px=$px date=$qdate via $src"
          # sanity: a real price, not null or a glitch
          awk -v p="$px" 'BEGIN { if (p+0 < 1 || p+0 > 10000) { print "implausible price: " p; exit 1 } }'
          mcap=$(awk -v p="$px" 'BEGIN { printf "%.2f", p*388.12/1000 }')
          printf '{"px": %s, "mcap": %s, "date": "%s", "source": "%s via GitHub Action", "shares_note": "mcap = px x 388.12M shares (Jul 2026 count)"}\n' \
            "$px" "$mcap" "$qdate" "$src" > market.json

      - name: Commit if changed
        run: |
          if git diff --quiet market.json; then
            echo "market.json unchanged — nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market.json
          git commit -m "market data: ASTS $(jq -r .date market.json) close \$$(jq -r .px market.json)"
          git push
